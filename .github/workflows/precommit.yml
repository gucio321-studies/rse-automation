name: precommit

defaults:
  run:
    shell: bash

on:
  push:
  pull_request:

jobs:
  precommit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
      - run: |
          pip install pre-commit
          pre-commit run --all-files --show-diff-on-failure 
